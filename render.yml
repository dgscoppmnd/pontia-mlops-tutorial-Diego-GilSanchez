services:
  - type: web
    name: pontia-mlops-tutorial-diego-gilsanchez
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r deployment/requirements.txt
    startCommand: uvicorn deployment.app.main:app --host 0.0.0.0 --port 8080
    # Para que Render sepa qué puerto exponer
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: GITHUB_REPO
        value: dgscoppmnd/pontia-mlops-tutorial-Diego-GilSanchez

