name: Integration

on:
  workflow_dispatch:
  pull_request:

jobs:
  integrate:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run tests and save exit code
        id: tests
        run: |
            mkdir -p test-results
            PYTHONPATH=src pytest unit_tests/ --capture=tee-sys --cov=model --cov-report=term --cov-report=html --junitxml=test-results/results.xml > test-results/results.log
      
      - name: Comment test results and coverage on PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const results = fs.readFileSync('test-results/results.log', 'utf8');
            const truncated = results.length > 65000 ? results.slice(0, 65000) + '\n...TRUNCATED...' : results;
            
            // Obtener el número del PR usando context.payload
            let prNumber = null;
            
            if (context.payload.pull_request) {
              prNumber = context.payload.pull_request.number;
            } else if (context.payload.issue) {
              prNumber = context.payload.issue.number;
            }
            
            if (!prNumber) {
              console.log('No PR/Issue number found. Event name:', context.eventName);
              console.log('Available in payload:', Object.keys(context.payload));
              return;
            }
            
            console.log(`Posting comment to PR/Issue #${prNumber}`);
            
            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### 🧪 Test Results with Coverage\n\n\`\`\`\n${truncated}\n\`\`\``
            });